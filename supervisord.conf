[supervisord]
nodaemon=true

[program:python-service]
directory=/app/python-service
command=uvicorn main:app --host 0.0.0.0 --port 8000
autostart=true
autorestart=true
stderr_logfile=/var/log/python-service.err.log
stdout_logfile=/var/log/python-service.out.log

[program:node-server]
directory=/app/server
command=npm start
autostart=true
autorestart=true
stderr_logfile=/var/log/node-server.err.log
stdout_logfile=/var/log/node-server.out.log

[program:react-client]
directory=/app/client
command=serve -s dist -l 3000
autostart=true
autorestart=true
stderr_logfile=/var/log/react-client.err.log
stdout_logfile=/var/log/react-client.out.log
